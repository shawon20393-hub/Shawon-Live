*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{height:100%;overflow:hidden;}
body{height:100%;background:#06080f;color:#eef0ff;font-family:'Josefin Sans',sans-serif;display:flex;flex-direction:column;overflow:hidden;}
::-webkit-scrollbar{display:none;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}
@keyframes flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes popIn{from{opacity:0;transform:scale(.93)}to{opacity:1;transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.page{display:none;flex-direction:column;flex:1;overflow:hidden;}
.page.active{display:flex;animation:fadeIn .2s ease;}

/* SPLASH / LOADING */
#splash{position:fixed;inset:0;background:#06080f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:16px;}
#splash.hide{display:none;}
#splash-logo{width:100px;height:100px;border-radius:20px;overflow:hidden;border:2px solid rgba(255,255,255,.15);}
#splash-logo img{width:100%;height:100%;object-fit:cover;}
#splash-title{font-family:'Orbitron',monospace;font-size:22px;font-weight:900;background:linear-gradient(135deg,#f472b6,#c084fc,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:2px;}
#splash-sub{font-size:12px;color:#3a4270;font-family:'Josefin Sans',sans-serif;letter-spacing:1px;}
#splash-bar-wrap{width:200px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;}
#splash-bar{height:100%;width:0%;background:linear-gradient(90deg,#e84393,#a855f7);border-radius:2px;transition:width .3s ease;}
#splash-status{font-size:11px;color:#2a3060;font-family:'Josefin Sans',sans-serif;margin-top:4px;}
#splash-err{display:none;color:#f97316;font-size:12px;text-align:center;max-width:260px;padding:0 20px;line-height:1.5;}
#splash-retry{display:none;background:linear-gradient(135deg,#e84393,#a855f7);border:none;color:#fff;padding:10px 24px;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:'Josefin Sans',sans-serif;margin-top:8px;}

/* NAVBAR */
.navbar{flex-shrink:0;height:58px;padding:0 14px;display:flex;align-items:center;gap:10px;background:#080b18;border-bottom:2px solid transparent;border-image:linear-gradient(90deg,#e84393,#a855f7,#3b82f6,#06b6d4,#e84393) 1;position:relative;}
#nav-logo{font-family:'Orbitron',monospace;font-size:15px;font-weight:900;letter-spacing:1px;line-height:1;background:linear-gradient(135deg,#f472b6,#c084fc,#60a5fa);background-size:200%;animation:flow 5s ease infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#nav-logo small{display:block;font-family:'Josefin Sans',sans-serif;font-size:9px;letter-spacing:3px;-webkit-text-fill-color:#2a3060;filter:none;margin-top:2px;}
#nav-made{position:absolute;left:50%;transform:translateX(-50%);font-size:11px;color:#3a4060;font-family:'Josefin Sans',sans-serif;letter-spacing:.5px;pointer-events:none;white-space:nowrap;}
#nav-ch-logo{margin-left:auto;width:38px;height:38px;border-radius:10px;overflow:hidden;flex-shrink:0;border:1.5px solid rgba(255,255,255,.12);}
#nav-ch-logo img{width:100%;height:100%;object-fit:cover;display:block;}
/* Refresh btn */
#nav-refresh{background:none;border:none;color:#3a4270;font-size:18px;cursor:pointer;padding:4px;transition:color .2s;flex-shrink:0;}
#nav-refresh:hover{color:#a855f7;}
#nav-refresh.spin{animation:spin .8s linear infinite;}

.searchbar{flex-shrink:0;padding:9px 12px;background:#080b18;border-bottom:1px solid rgba(255,255,255,.05);}
.searchbar input{width:100%;background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:8px;padding:8px 14px;color:#eef0ff;font-size:13px;outline:none;font-family:'Josefin Sans',sans-serif;}
.searchbar input:focus{border-color:#a855f7;}
.searchbar input::placeholder{color:#2a3060;}

#browse-body{flex:1;display:flex;overflow:hidden;min-height:0;}
#sidebar{width:150px;flex-shrink:0;background:#080b18;border-right:1px solid rgba(255,255,255,.06);overflow-y:auto;padding:8px 0;}
.cat-item{display:flex;align-items:center;gap:8px;padding:11px 12px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:.3px;color:#3a4270;border-left:3px solid transparent;transition:color .1s,background .1s;outline:none;}
.cat-item:hover,.cat-item:focus{color:#eef0ff;background:rgba(255,255,255,.05);}
.cat-item.active{color:#fff;border-left-color:var(--col);background:rgba(255,255,255,.07);}
.cat-item:focus{outline:2px solid var(--col);outline-offset:-2px;}
.cat-icon{font-size:13px;flex-shrink:0;}
.cat-lbl{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.cat-cnt{font-size:9px;color:#1e2540;}
#grid-area{flex:1;overflow-y:auto;padding:10px;min-width:0;}
#grid-title{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;letter-spacing:1.5px;color:#2a3060;margin-bottom:10px;padding:0 2px;}
#ch-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:9px;}

.ch-card{border-radius:12px;cursor:pointer;background:#0d1120;border:2px solid rgba(255,255,255,.07);transition:border-color .1s,box-shadow .1s,transform .1s;outline:none;text-align:center;}
.ch-card:hover,.ch-card:active,.ch-card:focus{border-color:var(--col);box-shadow:0 0 14px var(--glow);transform:scale(1.04);}
.ch-card:focus{outline:3px solid var(--col);outline-offset:2px;}
.ch-thumb{width:72px;height:72px;margin:10px auto 6px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--col-a),var(--col-b));position:relative;overflow:hidden;border-radius:50%;border:2px solid var(--col);}
.ch-thumb img{width:100%;height:100%;object-fit:cover;display:block;border-radius:50%;}
.ch-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:13px;font-weight:900;color:var(--col);border-radius:50%;}
.ch-play-hint{position:absolute;inset:0;background:rgba(0,0,0,.42);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .1s;border-radius:50%;}
.ch-card:hover .ch-play-hint,.ch-card:active .ch-play-hint,.ch-card:focus .ch-play-hint{opacity:1;}
.play-icon{width:28px;height:28px;background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#000;}
.ch-info{padding:0 6px 8px;}
.ch-name{font-size:11px;font-weight:700;color:#5a6490;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;transition:color .1s;text-align:center;}
.ch-card:hover .ch-name,.ch-card:active .ch-name,.ch-card:focus .ch-name{color:#eef0ff;}
.ch-grp{font-size:9px;color:var(--col);margin-top:2px;text-align:center;}
.mov-entry-card{border-radius:9px;cursor:pointer;overflow:hidden;border:2px solid rgba(249,115,22,.35);background:linear-gradient(135deg,#180800,#220d00);transition:all .1s;outline:none;}
.mov-entry-card:hover,.mov-entry-card:active,.mov-entry-card:focus{border-color:#f97316;box-shadow:0 0 18px rgba(249,115,22,.5);transform:scale(1.05);}
.mov-entry-card:focus{outline:3px solid #f97316;outline-offset:2px;}
.mov-entry-thumb{aspect-ratio:16/9;width:100%;display:flex;align-items:center;justify-content:center;font-size:28px;position:relative;background:linear-gradient(135deg,#f97316,#e84393,#a855f7);}
.mov-entry-badge{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border-radius:4px;padding:2px 5px;font-size:9px;font-weight:700;color:#f97316;font-family:'Orbitron',monospace;}
.mov-entry-info{padding:6px 7px 7px;}
.mov-entry-name{font-size:11px;font-weight:700;color:#f97316;}
.mov-entry-sub{font-size:9px;color:#5a6490;margin-top:2px;}

/* PLAYER */
#player-page{background:#000;}
.p-topbar{flex-shrink:0;height:50px;background:rgba(0,0,0,.88);display:flex;align-items:center;gap:10px;padding:0 12px;}
.back-btn{background:rgba(255,255,255,.1);border:none;color:#fff;width:36px;height:36px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .1s;outline:none;}
.back-btn:hover{background:rgba(255,255,255,.22);}
#p-ch-name{font-family:'Orbitron',monospace;font-size:14px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;background:linear-gradient(90deg,#fff,#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
#p-ch-sub{font-size:11px;color:#4a5280;margin-top:1px;}
.live-badge{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;color:#e84393;font-family:'Orbitron',monospace;letter-spacing:1px;flex-shrink:0;}
.ldot{width:6px;height:6px;background:#e84393;border-radius:50%;animation:pulse 1.2s infinite;display:inline-block;}
#p-video-wrap{flex:1;position:relative;background:#000;overflow:hidden;display:flex;}
#p-video-wrap video{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}
#swipe-ind{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:7;pointer-events:none;background:rgba(0,0,0,.75);border-radius:14px;padding:14px 22px;display:flex;flex-direction:column;align-items:center;gap:6px;backdrop-filter:blur(12px);opacity:0;transition:opacity .2s;}
#swipe-ind.show{opacity:1;}
#swipe-arrow{font-size:28px;}
#swipe-name{font-family:'Orbitron',monospace;font-size:12px;font-weight:700;color:#eef0ff;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;text-align:center;}
#vb-overlay{position:absolute;inset:0;z-index:6;display:flex;align-items:center;pointer-events:none;transition:opacity .3s;opacity:0;}
#vb-overlay.show{opacity:1;}
#vb-left{position:absolute;left:0;top:0;bottom:0;width:50%;display:flex;align-items:center;justify-content:flex-start;padding-left:20px;}
#vb-right{position:absolute;right:0;top:0;bottom:0;width:50%;display:flex;align-items:center;justify-content:flex-end;padding-right:20px;}
.vb-bar-wrap{display:flex;flex-direction:column;align-items:center;gap:8px;background:rgba(0,0,0,.65);border-radius:12px;padding:12px 10px;backdrop-filter:blur(12px);}
.vb-icon{font-size:18px;}
.vb-bar{width:6px;height:120px;background:rgba(255,255,255,.15);border-radius:3px;position:relative;overflow:hidden;}
.vb-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#a855f7,#e84393);border-radius:3px;transition:height .1s;}
.vb-val{font-size:11px;font-weight:700;color:#eef0ff;font-family:'Orbitron',monospace;}
#touch-left{position:absolute;left:0;top:0;width:40%;height:100%;z-index:5;}
#touch-center{position:absolute;left:30%;top:0;width:40%;height:100%;z-index:4;}
#touch-right{position:absolute;right:0;top:0;width:40%;height:100%;z-index:5;}
#p-toast{position:absolute;top:10px;right:10px;z-index:8;background:rgba(8,9,18,.95);border-radius:10px;padding:10px 13px;display:flex;align-items:center;gap:10px;min-width:160px;backdrop-filter:blur(20px);box-shadow:0 6px 28px rgba(0,0,0,.7);transition:transform .25s cubic-bezier(.4,0,.2,1),opacity .25s;transform:translateX(110%);opacity:0;border:1px solid rgba(255,255,255,.08);}
#p-toast.show{transform:translateX(0);opacity:1;}
#t-num{font-family:'Orbitron',monospace;font-size:20px;font-weight:900;min-width:30px;text-align:center;}
#t-name{font-size:12px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
#t-grp{font-size:9px;color:#3a4270;margin-top:1px;}
#p-loader{position:absolute;inset:0;z-index:4;background:rgba(6,8,15,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;}
#p-loader.hide{display:none;}
.spin-ring{width:44px;height:44px;margin-bottom:12px;border:2.5px solid rgba(255,255,255,.06);border-top-color:#e84393;border-right-color:#a855f7;border-radius:50%;animation:spin .8s linear infinite;}
#load-name{font-size:12px;font-weight:600;color:#3a4270;}
#load-err{color:#f97316;font-size:11px;margin-top:7px;display:none;text-align:center;max-width:240px;padding:0 14px;}
.p-ctrls{flex-shrink:0;background:rgba(0,0,0,.88);padding:9px 12px 14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.pbtn{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.12);color:#fff;height:38px;padding:0 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:'Josefin Sans',sans-serif;white-space:nowrap;transition:all .1s;outline:none;}
.pbtn:hover,.pbtn:focus{background:rgba(255,255,255,.2);border-color:#a855f7;}
#p-play-btn{width:46px;height:46px;border-radius:12px;padding:0;font-size:18px;justify-content:center;background:linear-gradient(135deg,#e84393,#a855f7);box-shadow:0 4px 18px rgba(232,67,147,.5);border:none;flex-shrink:0;}
#vol-row{display:flex;align-items:center;gap:6px;}
#p-vol{width:70px;accent-color:#a855f7;cursor:pointer;}

/* MOVIES */
#movie-page{background:#06080f;}
#site-tabs{flex-shrink:0;display:flex;gap:6px;padding:9px 12px;overflow-x:auto;background:#080b18;border-bottom:1px solid rgba(255,255,255,.05);}
.stab{flex-shrink:0;border-radius:8px;border:1.5px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);padding:7px 13px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Josefin Sans',sans-serif;color:#3a4270;transition:all .15s;}
.stab:hover{background:rgba(255,255,255,.08);color:#eef0ff;}
.stab.on{color:#fff;border-color:#f97316;background:rgba(249,115,22,.13);box-shadow:0 0 10px rgba(249,115,22,.28);}
#dl-bar{flex-shrink:0;padding:7px 12px;background:#080b18;border-bottom:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:8px;}
#dl-url{flex:1;background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.08);border-radius:7px;padding:6px 10px;color:#eef0ff;font-size:12px;outline:none;font-family:'Josefin Sans',sans-serif;}
#dl-url::placeholder{color:#2a3060;}
#dl-btn{background:linear-gradient(135deg,#a855f7,#3b82f6);border:none;color:#fff;padding:7px 14px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Josefin Sans',sans-serif;white-space:nowrap;flex-shrink:0;}
#dl-list{flex-shrink:0;max-height:60px;overflow-y:auto;}
.dl-item{display:flex;align-items:center;gap:8px;padding:4px 12px;font-size:11px;border-bottom:1px solid rgba(255,255,255,.03);}
.dl-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#6a74a0;}
.dl-prog{font-size:10px;color:#a855f7;font-family:'Orbitron',monospace;flex-shrink:0;}
#site-iframe-wrap{flex:1;position:relative;overflow:hidden;}
#site-iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:#06080f;}
#site-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#06080f;z-index:2;}
#site-loading.hide{display:none;}
#site-err{display:none;margin-top:14px;color:#f97316;font-size:12px;text-align:center;max-width:280px;padding:0 16px;flex-direction:column;align-items:center;gap:8px;}
#site-open-btn{background:linear-gradient(135deg,#f97316,#e84393);border:none;color:#fff;padding:8px 18px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Josefin Sans',sans-serif;font-weight:700;}
@media(max-width:400px){#sidebar{width:118px;}#ch-grid{grid-template-columns:repeat(auto-fill,minmax(88px,1fr));}}
</style>

/* ── M3U PARSER ── */
function parseM3U(text){
  var channels=[];
  var lines=text.split("\n");
  var i=0;
  while(i<lines.length){
    var line=lines[i].trim();
    if(line.indexOf("#EXTINF")===0){
      var logoM=line.match(/tvg-logo="([^"]*)"/);
      var grpM=line.match(/group-title="([^"]*)"/);
      var nameM=line.match(/,(.+)$/);
      var logo=logoM?logoM[1]:"";
      var group=grpM?grpM[1]:"Other";
      var name=nameM?nameM[1].trim():"Unknown";
      var j=i+1, url="";
      while(j<lines.length){
        var nl=lines[j].trim();
        if(nl&&nl.indexOf("#")!==0){url=nl;break;}
        j++;
      }
      if(url) channels.push({name:name,logo:logo,group:group,url:url});
      i=j+1;
    }else{i++;}
  }
  return channels;
}

function fetchPlaylist(forceRefresh){
  splashStatus("Connecting to server...", 10);
  splashShowErr(false);

  /* Check cache first */
  if(!forceRefresh){
    try{
      var cached=localStorage.getItem(CACHE_KEY);
      var cachedTime=parseInt(localStorage.getItem(CACHE_TIME_KEY)||"0");
      if(cached&&(Date.now()-cachedTime)<CACHE_TTL){
        var parsed=JSON.parse(cached);
        if(parsed&&parsed.length>0){
          splashStatus("Loading from cache...", 80);
          setTimeout(function(){initApp(parsed);},300);
          return;
        }
      }
    }catch(e){}
  }

  /* CORS proxies to try */
  var proxies=[
    PLAYLIST_URL,
    "https://corsproxy.io/?"+encodeURIComponent(PLAYLIST_URL),
    "https://api.allorigins.win/raw?url="+encodeURIComponent(PLAYLIST_URL),
    "https://cors-anywhere.herokuapp.com/"+PLAYLIST_URL,
  ];

  tryFetch(proxies, 0, forceRefresh);
}

function tryFetch(proxies, idx, forceRefresh){

    /* All failed — try cache fallback */

      if(cached){
        var parsed=JSON.parse(cached);
        if(parsed&&parsed.length>0){
          splashStatus("Using cached data...", 90);
          setTimeout(function(){initApp(parsed);},300);
          return;
        }
      }
    }catch(e){}
    splashStatus("Failed!", 100);
    splashShowErr("&#9888; Playlist load করা যাচ্ছে না।<br>Internet connection check করুন।");
    return;
  }

  var url=proxies[idx];
  var progress=20+(idx*20);
  splashStatus("Fetching playlist... ("+(idx+1)+"/"+proxies.length+")", progress);

  fetch(url,{cache:forceRefresh?"no-cache":"default"})
    .then(function(r){
      if(!r.ok)throw new Error("HTTP "+r.status);
      return r.text();
    })
    .then(function(text){
      if(text.indexOf("#EXTM3U")<0&&text.indexOf("#EXTINF")<0){
        throw new Error("Not valid M3U");
      }
      splashStatus("Parsing channels...", 85);
      var channels=parseM3U(text);
      if(channels.length===0)throw new Error("No channels found");

      /* Cache it */
      try{
        localStorage.setItem(CACHE_KEY, JSON.stringify(channels));
        localStorage.setItem(CACHE_TIME_KEY, String(Date.now()));
      }catch(e){}

      splashStatus("Done! "+channels.length+" channels", 100);
      setTimeout(function(){initApp(channels);},400);
    })
    .catch(function(err){
      console.log("Proxy "+idx+" failed:",err);
      tryFetch(proxies, idx+1, forceRefresh);
    });
}

function splashStatus(msg, pct){
  var s=$("splash-status");if(s)s.textContent=msg;
  var b=$("splash-bar");if(b)b.style.width=pct+"%";
}
function splashShowErr(msg){
  var e=$("splash-err");var r=$("splash-retry");
  if(!e)return;
  if(msg){e.innerHTML=msg;e.style.display="block";if(r)r.style.display="block";}
  else{e.style.display="none";if(r)r.style.display="none";}
}

/* ── INIT APP ── */
function initApp(channels){
  CH=channels;
  $("splash").classList.add("hide");
  showPage("browse-page");
  $("nav-count").textContent=CH.length+" CHANNELS";
  buildSidebar();
  buildGrid("ALL");
}

/* ── REFRESH ── */
function refreshPlaylist(){
  var btn=$("nav-refresh");
  if(btn)btn.classList.add("spin");
  $("splash").classList.remove("hide");
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  splashStatus("Refreshing...",10);
  splashShowErr(false);
  fetchPlaylist(true);
  setTimeout(function(){if(btn)btn.classList.remove("spin");},3000);
}

/* ── PAGE NAV ── */
function showPage(id){
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  $(id).classList.add("active");
  if(pageHistory[pageHistory.length-1]!==id)pageHistory.push(id);
}
function goBack(){
  pageHistory.pop();
  var prev=pageHistory[pageHistory.length-1]||"browse-page";
  document.querySelectorAll(".page").forEach(function(p){p.classList.remove("active");});
  $(prev).classList.add("active");
}

/* ── SIDEBAR ── */
function buildSidebar(){
  var allGroups=[];
  var seen={};
  CH.forEach(function(c){if(!seen[c.group]){seen[c.group]=true;allGroups.push(c.group);}});
  /* Sort by GORDER priority */
  allGroups.sort(function(a,b){
    var ai=GORDER.indexOf(a); var bi=GORDER.indexOf(b);
    if(ai<0)ai=999; if(bi<0)bi=999;
    return ai-bi;
  });
  var groups=["ALL"].concat(allGroups);
  var sb=$("sidebar");sb.innerHTML="";
  groups.forEach(function(g){
    var cnt=g==="ALL"?CH.length:CH.filter(function(c){return c.group===g;}).length;
    var el=document.createElement("div");
    el.className="cat-item"+(g===activeCat?" active":"");
    el.setAttribute("tabindex","0");el.setAttribute("data-cat",g);
    el.style.setProperty("--col",cc(g));
    el.style.borderLeftColor=g===activeCat?cc(g):"transparent";
    var s1=document.createElement("span");s1.className="cat-icon";s1.textContent=emo(g);
    var s2=document.createElement("span");s2.className="cat-lbl";s2.textContent=g;
    var s3=document.createElement("span");s3.className="cat-cnt";s3.textContent=cnt;
    el.appendChild(s1);el.appendChild(s2);el.appendChild(s3);
    el.addEventListener("click",function(){selCat(g);});
    el.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();selCat(g);}});
    sb.appendChild(el);
  });
}

function selCat(g){
  activeCat=g;
  document.querySelectorAll(".cat-item").forEach(function(b){
    var bg=b.getAttribute("data-cat");
    b.classList.toggle("active",bg===g);
    b.style.borderLeftColor=bg===g?cc(g):"transparent";
  });
  buildGrid(g);gridFocusIdx=0;
  var cards=$("ch-grid").querySelectorAll(".ch-card,.mov-entry-card");
  if(cards[0]){cards[0].focus();focusPanel="grid";}
}

/* ── GRID ── */
function makePlayHint(){var d=document.createElement("div");d.className="ch-play-hint";var pi=document.createElement("div");pi.className="play-icon";pi.textContent="▶";d.appendChild(pi);return d;}
function makeImg(logo,fb){
  if(!logo){var d=document.createElement("div");d.className="ch-fb";d.textContent=fb;return d;}
  var img=document.createElement("img");img.src=logo;img.loading="lazy";
  img.addEventListener("error",function(){imgErr(this);});
  var d=document.createElement("div");d.className="ch-fb";d.style.display="none";d.textContent=fb;
  var f=document.createDocumentFragment();f.appendChild(img);f.appendChild(d);return f;
}
function buildGrid(cat){
  var chs=cat==="ALL"?CH:CH.filter(function(c){return c.group===cat;});
  $("grid-title").textContent=(cat==="ALL"?"ALL":cat)+" ("+chs.length+")";
  var grid=$("ch-grid");grid.innerHTML="";
  if(cat==="ALL"){
    var mc=document.createElement("div");mc.className="mov-entry-card";mc.setAttribute("tabindex","0");
    var mt=document.createElement("div");mt.className="mov-entry-thumb";mt.textContent="🎬";
    var mb2=document.createElement("div");mb2.className="mov-entry-badge";mb2.textContent="MOVIES";mt.appendChild(mb2);
    var mi=document.createElement("div");mi.className="mov-entry-info";
    var mn=document.createElement("div");mn.className="mov-entry-name";mn.textContent="🎬 MOVIES";
    var ms2=document.createElement("div");ms2.className="mov-entry-sub";ms2.textContent="7 Streaming Sites";
    mi.appendChild(mn);mi.appendChild(ms2);mc.appendChild(mt);mc.appendChild(mi);
    mc.addEventListener("click",openMovies);
    mc.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();openMovies();}});
    grid.appendChild(mc);
  }
  chs.forEach(function(ch,i){
    var gi=CH.indexOf(ch);var c=cc(ch.group);
    var card=document.createElement("div");
    card.className="ch-card";card.setAttribute("tabindex","0");card.setAttribute("data-idx",gi);
    card.style.setProperty("--col",c);card.style.setProperty("--glow",c+"55");
    card.style.setProperty("--col-a",c+"15");card.style.setProperty("--col-b",c+"30");
    var thumb=document.createElement("div");thumb.className="ch-thumb";
    thumb.appendChild(makeImg(ch.logo,ini(ch.name)));thumb.appendChild(makePlayHint());
    var info=document.createElement("div");info.className="ch-info";
    var nm=document.createElement("div");nm.className="ch-name";nm.textContent=ch.name;
    var grp=document.createElement("div");grp.className="ch-grp";grp.textContent=emo(ch.group)+" "+ch.group;
    info.appendChild(nm);info.appendChild(grp);
    card.appendChild(thumb);card.appendChild(info);
    card.addEventListener("click",function(){playChannel(gi);});
    card.addEventListener("keydown",function(e){if(e.key==="Enter"||e.key===" "){e.preventDefault();playChannel(gi);}});
    card.addEventListener("focus",function(){gridFocusIdx=cat==="ALL"?i+1:i;});
    grid.appendChild(card);
  });
}
function doSearch(q){
  q=q.trim().toLowerCase();if(!q){buildGrid(activeCat);return;}
  var res=CH.filter(function(c){return c.name.toLowerCase().indexOf(q)>=0||c.group.toLowerCase().indexOf(q)>=0;});
  $("grid-title").textContent='"'+q.toUpperCase()+'" — '+res.length;
  var grid=$("ch-grid");grid.innerHTML="";
  res.forEach(function(ch){
    var gi=CH.indexOf(ch);var c=cc(ch.group);
    var card=document.createElement("div");
    card.className="ch-card";card.setAttribute("tabindex","0");card.setAttribute("data-idx",gi);
    card.style.setProperty("--col",c);card.style.setProperty("--glow",c+"55");
    card.style.setProperty("--col-a",c+"15");card.style.setProperty("--col-b",c+"30");
    var thumb=document.createElement("div");thumb.className="ch-thumb";
    thumb.appendChild(makeImg(ch.logo,ini(ch.name)));thumb.appendChild(makePlayHint());
    var info=document.createElement("div");info.className="ch-info";
    var nm=document.createElement("div");nm.className="ch-name";nm.textContent=ch.name;
    var grp=document.createElement("div");grp.className="ch-grp";grp.textContent=emo(ch.group)+" "+ch.group;
    info.appendChild(nm);info.appendChild(grp);
    card.appendChild(thumb);card.appendChild(info);
    card.addEventListener("click",function(){playChannel(gi);});
    grid.appendChild(card);
  });
}

/* ── PLAYER ── */
function playChannel(idx){
  if(idx<0||idx>=CH.length)return;
  curIdx=idx;lsSet(idx);
  var ch=CH[idx];var c=cc(ch.group);
  showPage("player-page");
  $("p-ch-name").textContent=ch.name;
  $("p-ch-sub").textContent=emo(ch.group)+" "+ch.group+" · CH "+(idx+1);
  $("p-play-btn").style.background="linear-gradient(135deg,"+c+",#a855f7)";
  $("t-num").textContent=idx+1;$("t-num").style.color=c;
  $("p-toast").style.borderColor=c+"44";
  $("t-name").textContent=ch.name;$("t-grp").textContent=emo(ch.group)+" "+ch.group;
  showToast();
  var vid=$("p-video");
  $("p-loader").classList.remove("hide");$("load-err").style.display="none";$("load-name").textContent=ch.name;
  clearTimeout(errT);
  errT=setTimeout(function(){$("load-err").textContent="Stream চলছে না।";$("load-err").style.display="block";},9000);
  if(hlsObj){hlsObj.destroy();hlsObj=null;}vid.src="";
  var url=ch.url;var Hls=window.Hls;
  var onReady=function(){$("p-loader").classList.add("hide");clearTimeout(errT);vid.play().catch(function(){});$("p-play-btn").textContent="⏸";};
  var onErr=function(){$("p-loader").classList.add("hide");};
  if(Hls&&Hls.isSupported()&&(url.indexOf(".m3u8")>=0||url.indexOf(".ts")>=0)){
    var h=new Hls({enableWorker:true,lowLatencyMode:true,fragLoadingTimeOut:8000,manifestLoadingTimeOut:8000,startFragPrefetch:true,backBufferLength:10});
    hlsObj=h;h.loadSource(url);h.attachMedia(vid);
    h.on(Hls.Events.MANIFEST_PARSED,onReady);
    h.on(Hls.Events.ERROR,function(e,d){if(d.fatal)onErr();});
  }else{
    vid.src=url;vid.addEventListener("loadedmetadata",onReady,{once:true});vid.addEventListener("error",onErr,{once:true});
  }
}
function closePlayer(){if(hlsObj){hlsObj.destroy();hlsObj=null;}$("p-video").src="";$("p-video").style.filter="";goBack();var cards=$("ch-grid").querySelectorAll(".ch-card,.mov-entry-card");if(cards[gridFocusIdx])cards[gridFocusIdx].focus();}
function togglePlay(){var v=$("p-video"),b=$("p-play-btn");if(v.paused){v.play();b.textContent="⏸";}else{v.pause();b.textContent="▶";}}
function prevCh(){if(curIdx>0)playChannel(curIdx-1);}
function nextCh(){if(curIdx<CH.length-1)playChannel(curIdx+1);}
function setVol(v){v=Math.max(0,Math.min(1,v));curVolume=v;$("p-video").volume=v;$("p-vol").value=v;$("vol-icon").textContent=v==0?"🔇":v<.5?"🔉":"🔊";$("vol-fill").style.height=Math.round(v*100)+"%";$("vol-val").textContent=Math.round(v*100)+"%";}
function setBrightness(v){v=Math.max(0.1,Math.min(1,v));curBrightness=v;$("p-video").style.filter="brightness("+v+")";$("br-fill").style.height=Math.round(v*100)+"%";$("br-val").textContent=Math.round(v*100)+"%";}
function showVB(){$("vb-overlay").classList.add("show");clearTimeout(vbT);vbT=setTimeout(function(){$("vb-overlay").classList.remove("show");},1500);}
function toggleFS(){var el=$("p-video-wrap");if(!document.fullscreenElement){if(el.requestFullscreen)el.requestFullscreen().catch(function(){});else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();}else{if(document.exitFullscreen)document.exitFullscreen();}}
function showToast(){$("p-toast").classList.add("show");clearTimeout(toastT);toastT=setTimeout(function(){$("p-toast").classList.remove("show");},2500);}
function showSwipeInd(dir,ch){var ind=$("swipe-ind");$("swipe-arrow").textContent=dir==="up"?"⬆ Previous":"⬇ Next";$("swipe-name").textContent=ch?ch.name:"";ind.classList.add("show");clearTimeout(swipeT);swipeT=setTimeout(function(){ind.classList.remove("show");},800);}

/* ── TOUCH ── */
function initTouchControls(){
  var wrap=$("p-video-wrap");
  var touchSide=null,touchStartX=0,touchStartY=0,touchStartVal=0,swipeActive=false,swipeLocked=false;
  function getZone(x,w){if(x<w*0.3)return "left";if(x>w*0.7)return "right";return "center";}
  wrap.addEventListener("touchstart",function(e){
    var t=e.touches[0];var rect=wrap.getBoundingClientRect();
    touchStartX=t.clientX-rect.left;touchStartY=t.clientY;
    touchSide=getZone(touchStartX,rect.width);
    touchStartVal=touchSide==="left"?curVolume:curBrightness;
    swipeActive=false;swipeLocked=false;
  },{passive:true});
  wrap.addEventListener("touchmove",function(e){
    var t=e.touches[0];var dy=touchStartY-t.clientY;var absDy=Math.abs(dy);
    var absDx=Math.abs(t.clientX-(wrap.getBoundingClientRect().left+touchStartX));
    if(!swipeLocked){
      if(touchSide==="center"&&absDy>20){swipeLocked=true;swipeActive=true;}
      else if(touchSide!=="center"&&absDy>15){swipeLocked=true;swipeActive=false;}
      else if(absDx>20){swipeLocked=true;swipeActive=false;}
    }
    if(swipeActive){e.preventDefault();}
    else if(touchSide==="left"&&swipeLocked){setVol(touchStartVal+dy/150);showVB();e.preventDefault();}
    else if(touchSide==="right"&&swipeLocked){setBrightness(touchStartVal+dy/150);showVB();e.preventDefault();}
  },{passive:false});
  wrap.addEventListener("touchend",function(e){
    if(swipeActive){var t=e.changedTouches[0];var dy=touchStartY-t.clientY;
      if(Math.abs(dy)>50){if(dy>0){if(curIdx>0){showSwipeInd("up",CH[curIdx-1]);setTimeout(prevCh,300);}}else{if(curIdx<CH.length-1){showSwipeInd("down",CH[curIdx+1]);setTimeout(nextCh,300);}}}
    }
    touchSide=null;swipeActive=false;swipeLocked=false;
  });
}

/* ── MOVIES ── */
function openMovies(){showPage("movie-page");loadSite(curSiteUrl);}
function loadSite(url){
  curSiteUrl=url;
  document.querySelectorAll(".stab").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-url")===url);});
  var loading=$("site-loading");var err=$("site-err");var iframe=$("site-iframe");
  loading.classList.remove("hide");if(err)err.style.display="none";iframe.src="";
  if($("site-open-btn"))$("site-open-btn").onclick=function(){window.open(url,"_blank");};
  clearTimeout(siteErrTimer);siteErrTimer=setTimeout(function(){if(err)err.style.display="flex";},8000);
  setTimeout(function(){iframe.onload=function(){clearTimeout(siteErrTimer);loading.classList.add("hide");};iframe.src=url;},50);
}
function toggleMovieFS(){var el=$("site-iframe-wrap");if(!document.fullscreenElement){if(el.requestFullscreen)el.requestFullscreen().catch(function(){});else if(el.webkitRequestFullscreen)el.webkitRequestFullscreen();}else{if(document.exitFullscreen)document.exitFullscreen();}}

/* ── DOWNLOAD ── */
var dlCount=0;
function startDownload(url){
  if(!url||url.indexOf("http")!==0)return;
  dlCount++;var fname=url.split("/").pop().split("?")[0]||("file"+dlCount);
  if(fname.length>28)fname=fname.slice(0,28)+"...";
  var item=document.createElement("div");item.className="dl-item";
  var nm=document.createElement("div");nm.className="dl-name";nm.textContent=fname;
  var prog=document.createElement("div");prog.className="dl-prog";prog.textContent="↓";
  item.appendChild(nm);item.appendChild(prog);$("dl-list").appendChild(item);
  var a=document.createElement("a");a.href=url;a.download=fname;a.target="_blank";a.style.display="none";document.body.appendChild(a);a.click();
  setTimeout(function(){document.body.removeChild(a);},500);
  setTimeout(function(){if(item.parentNode)item.parentNode.removeChild(item);},4000);
}

/* ── D-PAD ── */
function getCats(){return Array.from($("sidebar").querySelectorAll(".cat-item"));}
function getCards(){return Array.from($("ch-grid").querySelectorAll(".ch-card,.mov-entry-card"));}
document.addEventListener("keydown",function(e){
  var pid=(document.querySelector(".page.active")||{}).id||"";
  if(pid==="movie-page"){if(e.key==="Escape"||e.key==="Backspace"){e.preventDefault();$("site-iframe").src="";goBack();}return;}
  if(pid==="player-page"){
    switch(e.key){
      case" ":case"Enter":e.preventDefault();togglePlay();break;
      case"Escape":case"Backspace":e.preventDefault();closePlayer();break;
      case"ArrowUp":case"PageUp":e.preventDefault();prevCh();break;
      case"ArrowDown":case"PageDown":e.preventDefault();nextCh();break;
      case"ArrowLeft":e.preventDefault();prevCh();break;
      case"ArrowRight":e.preventDefault();nextCh();break;
      case"f":case"F":toggleFS();break;
      case"m":case"M":var vv=$("p-video");if(vv)vv.muted=!vv.muted;break;
    }return;
  }
  if(document.activeElement===$("search-inp"))return;
  var cats=getCats();var cards=getCards();
  var cols=Math.max(1,Math.floor(($("ch-grid").offsetWidth||300)/115));
  switch(e.key){
    case"ArrowLeft":e.preventDefault();focusPanel="cats";if(cats[catFocusIdx])cats[catFocusIdx].focus();break;
    case"ArrowRight":e.preventDefault();focusPanel="grid";if(cards[gridFocusIdx])cards[gridFocusIdx].focus();break;
    case"ArrowUp":e.preventDefault();if(focusPanel==="cats"){catFocusIdx=Math.max(0,catFocusIdx-1);if(cats[catFocusIdx])cats[catFocusIdx].focus();}else{gridFocusIdx=Math.max(0,gridFocusIdx-cols);if(cards[gridFocusIdx])cards[gridFocusIdx].focus();}break;
    case"ArrowDown":e.preventDefault();if(focusPanel==="cats"){catFocusIdx=Math.min(cats.length-1,catFocusIdx+1);if(cats[catFocusIdx])cats[catFocusIdx].focus();}else{gridFocusIdx=Math.min(cards.length-1,gridFocusIdx+cols);if(cards[gridFocusIdx])cards[gridFocusIdx].focus();}break;
    case"Enter":case" ":e.preventDefault();var f=document.activeElement;if(f&&f.classList.contains("mov-entry-card"))openMovies();else if(f&&f.classList.contains("ch-card"))playChannel(parseInt(f.getAttribute("data-idx")));else if(f&&f.classList.contains("cat-item"))selCat(f.getAttribute("data-cat"));break;
    case"Backspace":focusPanel="cats";if(cats[catFocusIdx])cats[catFocusIdx].focus();break;
  }
});

/* ── INIT ── */
document.addEventListener("DOMContentLoaded",function(){
  $("search-inp").addEventListener("input",function(e){doSearch(e.target.value);});
  document.querySelectorAll(".stab").forEach(function(b){b.addEventListener("click",function(){loadSite(b.getAttribute("data-url"));});});
  $("mb-back").addEventListener("click",function(){$("site-iframe").src="";goBack();});
  $("mb-fs-btn").addEventListener("click",toggleMovieFS);
  $("p-back").addEventListener("click",closePlayer);
  $("p-play-btn").addEventListener("click",togglePlay);
  $("btn-prev").addEventListener("click",prevCh);
  $("btn-next").addEventListener("click",nextCh);
  $("p-vol").addEventListener("input",function(){setVol(parseFloat(this.value));});
  $("p-fs-btn").addEventListener("click",toggleFS);
  $("dl-btn").addEventListener("click",function(){var u=$("dl-url").value.trim();if(u){startDownload(u);$("dl-url").value="";}});
  $("dl-url").addEventListener("keydown",function(e){if(e.key==="Enter"){var u=this.value.trim();if(u){startDownload(u);this.value="";}};});
  $("nav-refresh").addEventListener("click",refreshPlaylist);
  document.addEventListener("fullscreenchange",function(){var b=$("p-fs-btn");if(b)b.textContent=document.fullscreenElement?"⊠":"⛶";var mb=$("mb-fs-btn");if(mb)mb.textContent=document.fullscreenElement?"⊠":"⛶";});
  initTouchControls();
  /* Start fetching */
  fetchPlaylist(false);
});
</script>
